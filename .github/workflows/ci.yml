# Continuous deployment: link the repo in Vercel (root directory apps/web) and/or
# add a workflow_dispatch workflow with VERCEL_* secrets for CLI deploys.
#
# Web: typecheck + production build (ESLint during build is skipped; run `npm run lint` locally when fixed).

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web (lint, typecheck, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript
        run: npm run typecheck

      - name: Next.js production build
        run: npm run build
        env:
          # Avoid optional network fetches during CI (fonts, etc.)
          NEXT_TELEMETRY_DISABLED: "1"

  api:
    name: API (Ruff + compile)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install API package
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check app

      - name: Ruff format
        run: ruff format --check app

      - name: Byte-compile Python
        run: python -m compileall -q app
