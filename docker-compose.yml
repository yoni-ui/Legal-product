services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tebekaye
      POSTGRES_PASSWORD: tebekaye_dev
      POSTGRES_DB: tebekaye
    ports:
      - "5432:5432"
    volumes:
      - tebekaye_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tebekaye -d tebekaye"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - tebekaye_redis:/data

volumes:
  tebekaye_pgdata:
  tebekaye_redis:
